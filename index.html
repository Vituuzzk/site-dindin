<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dindin Gourmet</title>
    <!-- Tailwind CSS para deixar o site bonito de forma fácil -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Script do Supabase para conectar com o banco de dados -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-amber-50 text-neutral-800 font-sans min-h-screen">

    <!-- Cabeçalho / Topo do Site -->
    <header class="bg-amber-400 text-amber-950 text-center py-6 shadow-md">
        <h1 class="text-3xl font-black tracking-wider uppercase">Dindin Supremo</h1>
        <p class="text-sm font-medium mt-1">O dindin mais cremoso e gelado da região!</p>
    </header>

    <!-- Seção Principal -->
    <main class="max-w-md mx-auto px-4 py-8">
        <h2 class="text-xl font-bold border-b-2 border-amber-400 pb-2 mb-6">🍦 Nosso Cardápio</h2>
        
        <!-- Onde os dindins vão aparecer automaticamente -->
        <div id="lista-dindins" class="grid grid-cols-1 gap-6">
            <p class="text-center text-gray-500 animate-pulse">Carregando dindins gostosos...</p>
        </div>
    </main>

    <!-- Script de Conexão e Lógica -->
    <script>
        // CONFIGURAÇÃO DO SUPABASE
        // Substitua com os dados reais do seu projeto do Supabase depois!
        const SUPABASE_URL = "SUA_URL_DO_SUPABASE";
        const SUPABASE_KEY = "SUA_CHAVE_ANON_DO_SUPABASE";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função que busca os dindins no banco de dados e joga na tela
        async function carregarDindins() {
            const container = document.getElementById('lista-dindins');
            
            // Busca na tabela 'produtos' onde 'disponivel' é igual a true
            const { data: produtos, error } = await supabase
                .from('produtos')
                .select('*')
                .eq('disponivel', true);

            if (error) {
                console.error("Erro ao carregar:", error);
                container.innerHTML = "<p class='text-center text-red-500'>Erro ao carregar o cardápio. 😢</p>";
                return;
            }

            if (produtos.length === 0) {
                container.innerHTML = "<p class='text-center text-gray-500'>Nenhum dindin disponível hoje. Volte mais tarde!</p>";
                return;
            }

            // Limpa o texto de "Carregando..."
            container.innerHTML = "";

            // Cria o visual de cada dindin retornado do banco
            produtos.forEach(dindin => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm overflow-hidden border border-amber-100 flex flex-col";
                
                card.innerHTML = `
                    <img src="${dindin.imagem_url || 'https://via.placeholder.com/300'}" alt="${dindin.nome}" class="w-full h-48 object-cover">
                    <div class="p-4 flex flex-col justify-between flex-grow">
                        <div>
                            <h3 class="text-lg font-bold text-neutral-900">${dindin.nome}</h3>
                            <p class="text-sm text-gray-600 mt-1">${dindin.descricao}</p>
                        </div>
                        <div class="mt-4 flex items-center justify-between">
                            <span class="text-xl font-black text-amber-600">R$ ${Number(dindin.preco).toFixed(2)}</span>
                            <a href="https://wa.me/SEU_NUMERO_DE_TELEFONE?text=Oi!%20Quero%20encomendar%20um%20dindin%20de%20${encodeURIComponent(dindin.nome)}" 
                               target="_blank"
                               class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-xl text-sm transition shadow-sm">
                                Pedir no Zap
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Executa a função assim que a página abrir
        carregarDindins();
    </script>
</body>
</html>
