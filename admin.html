<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Dindin Gourmet</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Script do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cor-fundo: #fcf9f2;      
            --cor-texto-escuro: #2b1a11; 
            --cor-detalhe: #d9a05b;    
        }
        body { background-color: var(--cor-fundo); color: var(--cor-texto-escuro); font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

<!-- 🔐 MODAL DE PROTEÇÃO POR SENHA (ABRE AUTOMATICAMENTE) -->
<div id="modal-autenticacao" class="fixed inset-0 bg-[#1e120c]/90 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
    <div class="bg-[#fcf9f2] border border-[#2b1a11]/10 w-full max-w-xs rounded-3xl p-6 text-center shadow-2xl">
        <span class="text-4xl">🔐</span>
        <h4 class="font-serif font-bold text-lg mt-3 mb-1 text-[#2b1a11]">Painel Protegido</h4>
        <p class="text-xs text-stone-500 mb-6">Insira a chave mestra de acesso</p>
        
        <input type="password" id="campo-chave-admin" placeholder="••••••••" 
               class="w-full p-3 border border-[#d1c7bd] rounded-xl outline-none bg-white text-center text-sm focus:border-[#d9a05b] mb-4">
        
        <div class="flex gap-2">
            <button id="btn-entrar-painel" class="flex-1 py-3 bg-[#2b1a11] text-white text-xs font-bold uppercase rounded-xl cursor-pointer shadow-md transition active:scale-95">Entrar</button>
            <button id="btn-voltar-site" class="py-3 px-4 bg-stone-200 text-stone-600 text-xs font-bold uppercase rounded-xl cursor-pointer transition active:scale-95">Voltar</button>
        </div>
    </div>
</div>

<!-- 📊 CONTEÚDO DO PAINEL (INICIA ESCONDIDO PELO 'HIDDEN') -->
<main id="conteudo-painel" class="hidden w-full max-w-4xl space-y-8 animate-fadeIn">
    
    <!-- HEADER DO PAINEL -->
    <div class="flex flex-col sm:flex-row justify-between items-center bg-white border border-[#2b1a11]/5 rounded-3xl p-6 shadow-xs gap-4">
        <div class="text-center sm:text-left">
            <h2 class="text-2xl font-serif font-bold text-[#2b1a11]">Gerenciamento de Vendas</h2>
            <p class="text-xs text-stone-500">Adicione sabores, altere valores e modere avaliações.</p>
        </div>
        <button id="btn-logout" class="py-2.5 px-6 bg-red-800 text-white text-xs font-bold uppercase rounded-xl cursor-pointer shadow-sm">Sair do Painel</button>
    </div>

    <!-- SEÇÃO: CADASTRO DE NOVO SABOR -->
    <section class="bg-[#f7f2e7] border border-[#2b1a11]/5 rounded-3xl p-6 shadow-xs">
        <h3 class="text-lg font-serif font-bold mb-4 text-[#2b1a11]">✨ Adicionar Novo Dindin</h3>
        <form id="form-novo-sabor" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase text-stone-600 mb-1">Nome do Sabor</label>
                <input type="text" id="add-nome" required placeholder="Ex: Ninho com Nutella" class="w-full p-3 border border-[#d1c7bd] rounded-xl outline-none bg-white text-sm focus:border-[#d9a05b]">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-stone-600 mb-1">Preço (R$)</label>
                <input type="number" id="add-preco" required step="0.01" placeholder="6.00" class="w-full p-3 border border-[#d1c7bd] rounded-xl outline-none bg-white text-sm focus:border-[#d9a05b]">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold uppercase text-stone-600 mb-1">URL da Imagem (Unsplash ou link direto)</label>
                <input type="url" id="add-imagem" placeholder="https://images.unsplash.com/..." class="w-full p-3 border border-[#d1c7bd] rounded-xl outline-none bg-white text-sm focus:border-[#d9a05b]">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold uppercase text-stone-600 mb-1">Descrição Curta</label>
                <textarea id="add-descricao" rows="2" placeholder="Descreva os diferenciais desse dindin..." class="w-full p-3 border border-[#d1c7bd] rounded-xl outline-none bg-white text-sm focus:border-[#d9a05b] resize-none"></textarea>
            </div>
            <button type="submit" class="md:col-span-2 py-3 bg-[#2b1a11] text-white font-bold text-xs uppercase tracking-wider rounded-xl cursor-pointer shadow-md">Salvar Novo Dindin no Banco</button>
        </form>
    </section>

    <!-- SEÇÃO: LISTA DE GERENCIAMENTO (SABORES ATUAIS) -->
    <section class="bg-white border border-[#2b1a11]/5 rounded-3xl p-6 shadow-xs">
        <h3 class="text-lg font-serif font-bold mb-4 text-[#2b1a11]">🍦 Sabores no Cardápio Atual</h3>
        <div id="tabela-admin-produtos" class="space-y-4">
            <p class="text-center text-stone-400 animate-pulse text-sm">Buscando sabores salvos...</p>
        </div>
    </section>

    <!-- SEÇÃO: MODERAÇÃO DE AVALIAÇÕES -->
    <section class="bg-[#f7f2e7] border border-[#2b1a11]/5 rounded-3xl p-6 shadow-xs">
        <h3 class="text-lg font-serif font-bold mb-4 text-[#2b1a11]">💬 Controle de Avaliações dos Clientes</h3>
        <div id="lista-admin-avaliacoes" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="col-span-full text-center text-stone-400 text-sm">Carregando depoimentos enviados...</p>
        </div>
    </section>
</main>

<script type="module">
    // CONFIGURAÇÃO REAL DO SEU SUPABASE
    const SUPABASE_URL = "https://chssifwpqrehztdyfssl.supabase.co";
    const SUPABASE_KEY = "sb_publishable_fRdHLOKe1zxnVbUgdqiB1g_i3LPqDSE"; 

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // CONTROLE DE SEGURANÇA NA TELA DO ADMIN
    const modalAutenticacao = document.getElementById('modal-autenticacao');
    const conteudoPainel = document.getElementById('conteudo-painel');
    const campoChave = document.getElementById('campo-chave-admin');
    const btnEntrar = document.getElementById('btn-entrar-painel');
    const btnVoltar = document.getElementById('btn-voltar-site');
    const btnLogout = document.getElementById('btn-logout');

    // Foco automático ao abrir a página
    campoChave.focus();

    function realizarLoginAdmin() {
        if (campoChave.value.trim() === 'admin') {
            modalAutenticacao.classList.add('hidden'); // Oculta o bloqueio
            conteudoPainel.classList.remove('hidden'); // Revela o painel de edição
            carregarDadosPainel(); // Inicializa o banco de dados
        } else {
            alert('Código secreto inválido!');
            campoChave.value = '';
        }
    }

    btnEntrar.addEventListener('click', realizarLoginAdmin);
    campoChave.addEventListener('keypress', (e) => { if (e.key === 'Enter') realizarLoginAdmin(); });
    
    // Botão de recuar joga o usuário pro cardápio público
    btnVoltar.addEventListener('click', () => { window.location.href = 'index.html'; });
    btnLogout.addEventListener('click', () => { window.location.href = 'index.html'; });

    // FUNÇÃO PARA CHAMAR TODAS AS LISTAGENS APÓS LOGIN CORRETO
    function carregarDadosPainel() {
        listarProdutosAdmin();
        listarAvaliacoesAdmin();
    }

    // LISTAR PRODUTOS COM BOTÃO DE EXCLUSÃO
    async function listarProdutosAdmin() {
        const container = document.getElementById('tabela-admin-produtos');
        try {
            const { data: produtos, error } = await supabase.from('produtos').select('*').order('nome');
            container.innerHTML = '';
            if (error || !produtos || produtos.length === 0) {
                container.innerHTML = '<p class="text-stone-400 text-center py-4 text-sm">Nenhum produto cadastrado no banco.</p>';
                return;
            }
            produtos.forEach(p => {
                const item = document.createElement('div');
                item.className = 'flex flex-col sm:flex-row justify-between items-center bg-stone-50 border border-stone-100 p-4 rounded-2xl gap-3 text-sm';
                item.innerHTML = `
                    <div class="flex items-center gap-4 text-left w-full sm:w-auto">
                        <img src="${p.imagem_url || 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&q=80&w=200'}" class="w-12 h-12 object-cover rounded-xl shadow-xs">
                        <div>
                            <h5 class="font-bold text-[#2b1a11]">${p.nome}</h5>
                            <span class="text-xs font-semibold text-[#d9a05b]">R$ ${Number(p.preco).toFixed(2).replace('.', ',')}</span>
                        </div>
                    </div>
                    <button class="w-full sm:w-auto px-4 py-2 bg-red-100 text-red-800 font-bold text-xs uppercase rounded-xl cursor-pointer hover:bg-red-200 transition btn-deletar-prod">Excluir</button>
                `;
                item.querySelector('.btn-deletar-prod').addEventListener('click', async () => {
                    if (confirm(`Deseja mesmo remover o sabor "${p.nome}" permanentemente?`)) {
                        await supabase.from('produtos').delete().eq('id', p.id);
                        listarProdutosAdmin();
                    }
                });
                container.appendChild(item);
            });
        } catch (e) { container.innerHTML = '<p class="text-red-700 text-center text-xs">Erro na conexão do catálogo.</p>'; }
    }

    // SALVAR NOVO SABOR
    document.getElementById('form-novo-sabor').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nome = document.getElementById('add-nome').value.trim();
        const preco = parseFloat(document.getElementById('add-preco').value);
        const imagem_url = document.getElementById('add-imagem').value.trim();
        const descricao = document.getElementById('add-descricao').value.trim();

        try {
            const { error } = await supabase.from('produtos').insert([{ nome, preco, imagem_url, descricao, disponivel: true }]);
            if (error) throw error;
            alert('Novo dindin adicionado com sucesso! 🍦');
            document.getElementById('form-novo-sabor').reset();
            listarProdutosAdmin();
        } catch (err) { alert('Erro ao cadastrar sabor.'); }
    });

    // LISTAR E MODERAR AVALIAÇÕES
    async function listarAvaliacoesAdmin() {
        const container = document.getElementById('lista-admin-avaliacoes');
        try {
            const { data: avaliacoes, error } = await supabase.from('avaliacoes').select('*').order('criado_em', { ascending: false });
            container.innerHTML = '';
            if (error || !avaliacoes || avaliacoes.length === 0) {
                container.innerHTML = '<p class="col-span-full text-stone-400 text-center py-4 text-xs">Nenhum comentário recebido.</p>';
                return;
            }
            avaliacoes.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white p-4 rounded-2xl border border-stone-200 flex flex-col justify-between text-left text-xs gap-3';
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between font-bold mb-1">
                            <span class="text-[#2b1a11]">${item.nome}</span>
                            <span>${'⭐'.repeat(item.estrelas)}</span>
                        </div>
                        <p class="text-stone-600 italic">"${item.comentario}"</p>
                    </div>
                    <button class="w-full py-1.5 bg-stone-100 hover:bg-red-100 text-stone-700 hover:text-red-800 font-bold uppercase rounded-lg transition btn-deletar-aval">Apagar Depoimento</button>
                `;
                card.querySelector('.btn-deletar-aval').addEventListener('click', async () => {
                    if (confirm('Remover essa avaliação do seu site?')) {
                        await supabase.from('avaliacoes').delete().eq('id', item.id);
                        listarAvaliacoesAdmin();
                    }
                });
                container.appendChild(card);
            });
        } catch (e) { container.innerHTML = '<p class="col-span-full text-red-700 text-xs">Erro ao carregar depoimentos.</p>'; }
    }
</script>
</body>
</html>
