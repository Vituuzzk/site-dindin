<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Dindin Gourmet</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="text/javascript" src="https://npmcdn.com/parse/dist/parse.min.js"></script>
</head>
<body class="bg-[#fcf9f2] text-[#2b1a11] font-sans min-h-screen">

    <header class="bg-[#2b1a11] text-[#fcf9f2] p-6 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-serif font-black tracking-tight">Painel de Controle Administrativo</h1>
            <p class="text-[10px] text-[#d9a05b] uppercase tracking-widest font-bold mt-1">Gerenciamento Back4App</p>
        </div>
        <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-[#d9a05b] text-white font-bold rounded-xl text-xs">← Ver Cardápio</button>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-[#f7f2e7] border border-[#2b1a11]/10 rounded-3xl p-6 shadow-xs">
                    <h2 id="form-titulo" class="text-lg font-serif font-bold mb-4">Cadastrar Novo Dindin</h2>
                    <form id="form-produto" class="space-y-4">
                        <input type="hidden" id="prod-id">
                        <input type="text" id="prod-nome" placeholder="Sabor" required class="w-full p-3 border rounded-xl bg-white text-sm">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" step="0.01" id="prod-preco" placeholder="Preço" required class="w-full p-3 border rounded-xl bg-white text-sm">
                            <select id="prod-disponivel" class="w-full p-3 border rounded-xl bg-white text-sm">
                                <option value="true">Ativo</option>
                                <option value="false">Oculto</option>
                            </select>
                        </div>
                        <textarea id="prod-descricao" placeholder="Descrição" rows="2" class="w-full p-3 border rounded-xl bg-white text-sm"></textarea>
                        <input type="url" id="prod-imagem" placeholder="Link da Imagem" class="w-full p-3 border rounded-xl bg-white text-sm">
                        <button type="submit" id="btn-salvar" class="w-full py-3 bg-[#2b1a11] text-white font-bold rounded-xl text-xs uppercase">Salvar Sabor</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white border rounded-3xl p-6 shadow-xs">
                    <h3 class="text-lg font-serif font-bold mb-4">🍦 Sabores no Cardápio</h3>
                    <table class="w-full text-left text-sm">
                        <tbody id="tabela-produtos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO BACK4APP
        Parse.initialize("LHD9IPCKfZ6u9WLaAiNic9iKDTaaRQia8KcLr4IV", "sKtR5OHCmqp28DUWElfW3XG1PBBVDQihUaYI1Iok");
        Parse.serverURL = "https://parseapi.back4app.com/";

        const formProduto = document.getElementById('form-produto');
        
        // --- FUNÇÕES DE PRODUTOS ---
        async function renderizarProdutos() {
            const query = new Parse.Query("produtos");
            const res = await query.find();
            const tbody = document.getElementById('tabela-produtos');
            tbody.innerHTML = '';
            res.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 font-bold text-xs">${p.get('nome')}</td>
                    <td class="p-3 text-xs">R$ ${Number(p.get('preco')).toFixed(2)}</td>
                    <td class="p-3">
                        <button class="btn-editar bg-[#d9a05b] text-white px-3 py-1 rounded-lg text-[10px]">Editar</button>
                        <button class="btn-excluir bg-rose-600 text-white px-3 py-1 rounded-lg text-[10px]">Excluir</button>
                    </td>
                `;
                tr.querySelector('.btn-editar').onclick = () => {
                    document.getElementById('prod-id').value = p.id;
                    document.getElementById('prod-nome').value = p.get('nome');
                    document.getElementById('prod-preco').value = p.get('preco');
                    document.getElementById('prod-descricao').value = p.get('descricao');
                    document.getElementById('prod-imagem').value = p.get('imagem_url');
                };
                tr.querySelector('.btn-excluir').onclick = async () => {
                    await p.destroy();
                    renderizarProdutos();
                };
                tbody.appendChild(tr);
            });
        }

        formProduto.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('prod-id').value;
            const Produto = Parse.Object.extend("produtos");
            const p = id ? await new Parse.Query("produtos").get(id) : new Produto();
            
            p.set("nome", document.getElementById('prod-nome').value);
            p.set("preco", parseFloat(document.getElementById('prod-preco').value));
            p.set("disponivel", document.getElementById('prod-disponivel').value === 'true');
            p.set("descricao", document.getElementById('prod-descricao').value);
            p.set("imagem_url", document.getElementById('prod-imagem').value);
            
            await p.save();
            formProduto.reset();
            document.getElementById('prod-id').value = '';
            renderizarProdutos();
        };

        renderizarProdutos();
    </script>
</body>
</html>
